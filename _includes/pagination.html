<div class="pagination">
  {% if page.previous %}
    <a href="{{ page.previous.url | relative_url }}" class="previous">
      &laquo; {{ page.previous.title }}
    </a>
  {% endif %}
  
  {% if page.next %}
    <a href="{{ page.next.url | relative_url }}" class="next">
      {{ page.next.title }} &raquo;
    </a>
  {% endif %}
</div>
